<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SECURE NODE - TECHNICAL DIAGNOSTICS</title>
    <style>
        body { 
            background-color: #050505; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        #game-viewport {
            width: 1100px;
            height: 650px;
            display: flex;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            background: #000;
        }

        #left-panel {
            flex: 2;
            border-right: 1px solid #0f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #right-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 20, 0, 0.5);
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px #0f0; margin-bottom: 30px;}

        #logs-container { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; margin-bottom: 10px;}
        #logs { margin-top: auto; }
        p { margin: 2px 0; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        
        .terminal-prompt-mockup { display: flex; align-items: center; font-size: 14px; position: relative; border-top: 1px dashed #0f0; padding-top: 10px; }
        .mockup-prompt-char { color: #ff00ff; font-weight: bold; margin-right: 5px; } 
        .mockup-brackets { display: inline-flex; align-items: center; position: relative; }
        .real-command-display { color: #0f0; text-shadow: 0 0 3px #0f0; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .block-cursor { display: inline-block; width: 8px; height: 1.2em; background-color: #0f0; animation: blink 1s step-end infinite; margin-left: 1px; }

        #cmdInput { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; pointer-events: auto; font-size: 14px;}
        
        .led-container { display: flex; align-items: center; width: 100%; margin: 15px 0; padding: 10px; border: 1px solid transparent;}
        .led {
            width: 40px; height: 40px; border-radius: 50%; background-color: #222; 
            margin-right: 20px; box-shadow: inset 0 0 10px #000;
            transition: background-color 0.1s, box-shadow 0.1s; /* Szybsza reakcja na ON/OFF */
        }
        .led-label { font-size: 16px; font-weight: bold; color: #aaa; text-transform: uppercase; }

        .led.orange { background-color: #ffaa00; box-shadow: 0 0 20px #ffaa00, inset 0 0 10px rgba(255,255,255,0.5); color: #fff; }
        .led.green { background-color: #00ff00; box-shadow: 0 0 20px #00ff00, inset 0 0 10px rgba(255,255,255,0.5); }
        .led.red-flash { animation: redFlash 0.5s linear 2; } 
        @keyframes redFlash { 0%, 100% { background-color: #222; box-shadow: none; } 50% { background-color: #ff0000; box-shadow: 0 0 30px #ff0000; } }

        /* Miganie sterowane przez JS, nie przez CSS animation dla precyzji */
        .led.active-blink { background-color: #ffaa00; box-shadow: 0 0 20px #ffaa00; }

        #editor-overlay {
            display: none; position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0; z-index: 100; flex-direction: column; padding: 10px;
        }
        #editor-header { color: #000; background: #0f0; padding: 2px 10px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between;}
        #editor-textarea { flex-grow: 1; background: transparent; color: #0f0; font-family: 'Courier New', monospace; font-size: 14px; border: none; outline: none; resize: none;}
        #editor-footer { font-size: 12px; color: #aaa; margin-top: 5px; border-top: 1px dashed #0f0; padding-top: 5px;}

        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        #startBtn { background: transparent; border: 2px solid #0f0; color: #0f0; padding: 15px 30px; font-size: 20px; font-family: monospace; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 10px #0f0;}
        #startBtn:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color: #0f0;">SYSTEM DIAGNOSTYCZNY</h2>
        <p style="color: #0f0; margin-bottom: 20px;">Wymagana autoryzacja dostępu do kanału audio.</p>
        <button id="startBtn">>> Zainicjuj Sekwencję Startową <<</button>
    </div>

    <div id="game-viewport">
        <div id="left-panel">
            <div id="logs-container">
                <div id="logs"></div>
            </div>
            
            <div class="terminal-prompt-mockup">
                <span class="mockup-prompt-char" id="promptStr">adrian@sys-node:~#</span>
                <span class="mockup-brackets">[
                    <span class="real-command-display" id="realCmdDisplay"></span>
                    <span class="block-cursor"></span>
                ]</span>
                <input type="text" id="cmdInput" autocomplete="off" oninput="updateCmdDisplay()">
            </div>

            <div id="editor-overlay">
                <div id="editor-header">
                    <span>EDIT: sys.conf</span>
                    <span id="editor-status"></span>
                </div>
                <textarea id="editor-textarea" spellcheck="false"></textarea>
                <div id="editor-footer">
                    [CTRL+S] Zapisz &nbsp; | &nbsp; [CTRL+X] Wyjdź (bez zapisu)
                </div>
            </div>
        </div>

        <div id="right-panel">
            <h2>STATUS SYSTEMU</h2>
            
            <div class="led-container">
                <div class="led orange" id="led-1"></div>
                <div class="led-label">Stage 1</div>
            </div>
            
            <div class="led-container">
                <div class="led" id="led-2"></div>
                <div class="led-label">Stage 2</div>
            </div>
            
            <div class="led-container">
                <div class="led" id="led-3"></div>
                <div class="led-label">Stage 3</div>
            </div>
        </div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');
        const logsContainer = document.getElementById('logs-container');
        const cmdInput = document.getElementById('cmdInput');
        const realCmdDisplay = document.getElementById('realCmdDisplay');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('startBtn');
        const editorOverlay = document.getElementById('editor-overlay');
        const editorTextarea = document.getElementById('editor-textarea');
        const editorStatus = document.getElementById('editor-status');
        const promptStr = document.getElementById('promptStr');

        const leds = { 1: document.getElementById('led-1'), 2: document.getElementById('led-2'), 3: document.getElementById('led-3') };

        const knownCommands = ['ls', 'cat', 'cd', 'edit', 'clear', 'help'];
        let currentStage = 1; 
        let audioCtx;
        let isEditing = false;
        let ledMorseEnabled = false; 

        // HASŁO MORSE - Bilard (HEX: 42 69 6C 61 72 64)
        const morseSequence = "....- ..---   -.... ----.   -.... -.-.   -.... .----   --... ..---   -.... ....-";

        // DOMYŚLNE CZASY MORSE'A (Konfigurowalne w sys.conf)
        let timings = {
            dot: 400,
            dash: 800,
            gap: 400, // Odstęp między elementami znaku
            letterGap: 1200,
            wordGap: 2800 // 7 * dot (standard)
        };

        const virtualFS = {
            "name": "~",
            "type": "dir",
            "files": {
                "readme.txt": { type: "file", content: "Adrian, wentylator serwera zagłusza sygnał audio (30% vol). Sprawdź diagnostykę wizualną w 'sys.conf'. Zweryfikuj parametry czasowe." },
                "sys.conf": { type: "file", content: "ENABLE_LED_VISUAL=0\nMORSE_DOT_MS=400\nMORSE_DASH_MS=800\nMORSE_LETTER_GAP_MS=1200" },
                "system_logs": { type: "dir", locked: false, pass: null, files: {
                    "boot.log": { type: "file", content: "[OK] Kernel loaded\n[WARN] Audio subsystem unstable\n[OK] VFS mounted" }
                }},
                "stg_1": { type: "dir", locked: true, pass: "bilard", files: {
                    "hint_1.txt": { type: "file", content: "Stage 1 skompletowany. Kolejne hasło ukryte w systemie binarnym. Szukaj w katalogu 'cache'." }
                }},
                "cache": { type: "dir", locked: false, pass: null, files: {
                    "stg2_key.bin": { type: "file", content: "01010000 01000001 01010010 01010100 01011001" } // PARTI
                }},
                "stg_2": { type: "dir", locked: true, pass: "party", files: {
                    "hint_2.txt": { type: "file", content: "Dobra robota. Jesteś w Stage 2. Hasło do Stage 3 to Hex: 46 49 4E 41 4C" } // FINAL
                }},
                "stg_3": { type: "dir", locked: true, pass: "final", files: {
                    "final_wishes.txt": { type: "file", content: "GRATULACJE ADRIAN!\nUdało Ci się przejść wszystkie etapy.\nTo koniec demo. Prezent czeka w Skrypcie Python." }
                }}
            }
        };

        let currentDirObj = virtualFS;
        let currentPath = "~";
        let passwordPromptTarget = null;

        // --- AUDIO ---
        async function initAudio() {
            startBtn.innerText = "ŁADOWANIE JĄDRA... [OK]";
            startBtn.disabled = true;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            try {
                const [startRes, loopRes, morseRes] = await Promise.all([ fetch('start.wav'), fetch('loop.wav'), fetch('morse.wav') ]);
                const startBuffer = await audioCtx.decodeAudioData(await startRes.arrayBuffer());
                const loopBuffer = await audioCtx.decodeAudioData(await loopRes.arrayBuffer());
                const morseBuffer = await audioCtx.decodeAudioData(await morseRes.arrayBuffer());

                const startSource = audioCtx.createBufferSource(); startSource.buffer = startBuffer;
                const loopSource = audioCtx.createBufferSource(); loopSource.buffer = loopBuffer; loopSource.loop = true;
                const morseSource = audioCtx.createBufferSource(); morseSource.buffer = morseBuffer;

                const morseGain = audioCtx.createGain(); morseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);

                startSource.connect(audioCtx.destination);
                loopSource.connect(audioCtx.destination);
                morseSource.connect(morseGain); 
                morseGain.connect(audioCtx.destination);

                const t0 = audioCtx.currentTime;
                startSource.start(t0); 
                loopSource.start(t0 + startBuffer.duration); 
                morseSource.start(t0 + startBuffer.duration + 5); 

                setTimeout(() => {
                    startScreen.style.display = 'none';
                    cmdInput.focus();
                    printIntroLogs();
                }, 1000);
            } catch (e) {
                alert("Błąd ładowania audio. Upewnij się, że start.wav, loop.wav i morse.wav są w repozytorium.");
                startScreen.innerHTML = "<h2 style='color:#f00;'>BŁĄD KRYTYCZNY AUDIO</h2>";
            }
        }
        startBtn.addEventListener('click', initAudio);

        // --- DIODY LED ---
        function updateLeds() {
            for (let stage in leds) {
                let led = leds[stage];
                led.className = 'led'; 
                if (stage < currentStage) led.classList.add('green');
                else if (stage == currentStage) {
                    led.classList.add('orange');
                    if (currentStage == 1 && ledMorseEnabled) startMorseLedBlink();
                }
            }
        }

        function flashRedLeds() {
            for (let stage in leds) leds[stage].className = 'led red-flash';
            setTimeout(updateLeds, 1000);
        }

        let morseTimeout;
        let isOutputtingMorse = false;

        function startMorseLedBlink() {
            if (currentStage !== 1 || !ledMorseEnabled || isOutputtingMorse) return;
            
            clearTimeout(morseTimeout);
            isOutputtingMorse = true;
            let currentIndex = 0;

            function processNext() {
                if (currentIndex >= morseSequence.length || currentStage !== 1 || !ledMorseEnabled) {
                    isOutputtingMorse = false;
                    if (currentStage == 1 && ledMorseEnabled) morseTimeout = setTimeout(startMorseLedBlink, timings.wordGap); 
                    return;
                }
                const char = morseSequence[currentIndex];
                currentIndex++;

                if (char === ".") {
                    triggerLedPulse(timings.dot); 
                    morseTimeout = setTimeout(processNext, timings.dot + timings.gap); 
                } else if (char === "-") {
                    triggerLedPulse(timings.dash); 
                    morseTimeout = setTimeout(processNext, timings.dash + timings.gap);
                } else if (char === " ") {
                    // Przerwa między literami. timings.gap już dodany w poprz. kroku, dodajemy resztę.
                    morseTimeout = setTimeout(processNext, timings.letterGap - timings.gap);
                }
            }
            processNext();
        }

        function triggerLedPulse(duration) {
            leds[1].classList.add('active-blink');
            setTimeout(() => { leds[1].classList.remove('active-blink'); }, duration);
        }

        function stopMorseLedEffect() { 
            clearTimeout(morseTimeout);
            isOutputtingMorse = false;
            if (leds[1]) leds[1].classList.remove('active-blink'); 
        }

        // --- TERMINAL ---
        function updateCmdDisplay() {
            if (passwordPromptTarget) {
                realCmdDisplay.innerHTML = "*".repeat(cmdInput.value.length);
            } else {
                realCmdDisplay.innerHTML = cmdInput.value.replace(/ /g, '&nbsp;');
            }
        }

        function updatePrompt() {
            if (passwordPromptTarget) {
                promptStr.innerText = `[LOCKED] Enter password for ${passwordPromptTarget.name}: `;
            } else {
                promptStr.innerText = `adrian@sys-node:${currentPath}#`;
            }
        }

        function printLog(text, color = "#0f0", delay = 0) {
            setTimeout(() => {
                const p = document.createElement('p');
                p.style.color = color;
                p.innerHTML = text;
                logsDiv.appendChild(p);
                logsContainer.scrollTop = logsContainer.scrollHeight;
            }, delay);
        }

        function printIntroLogs() {
            printLog("WITAJ ADRIAN W SYSTEMIE DIAGNOSTYCZNYM.", "#ff0", 100);
            printLog("Zlokalizuj anomalie w kanale audio lub diagnostyce wizualnej.", "#0f0", 300);
            printLog("Wpisz 'help', aby wyświetlić dostępne komendy.", "#aaa", 500);
        }

        function executeCommand(command) {
            const args = command.trim().split(/\s+/);
            const cmd = args[0].toLowerCase();
            printLog(`adrian@sys-node:${currentPath}# ` + command, "#ff00ff");

            if (!knownCommands.includes(cmd) && cmd !== "") {
                printLog("ACCESS DENIED: Komenda nieznana lub brak uprawnień.", "#f00");
                return;
            }

            switch (cmd) {
                case 'help':
                    printLog("ls      - listowanie plików i katalogów");
                    printLog("cd      - zmiana katalogu (np. cd stg_1)");
                    printLog("cat     - odczyt zawartości pliku (np. cat readme.txt)");
                    printLog("edit     - edycja pliku konfiguracyjnego");
                    printLog("clear   - czyszczenie ekranu");
                    break;
                case 'ls':
                    let output = [];
                    for (let name in currentDirObj.files) {
                        let obj = currentDirObj.files[name];
                        if (obj.type === 'dir') {
                            let lockStr = obj.locked ? " <span style='color:#f00; font-size:11px;'>[LOCKED]</span>" : "";
                            output.push(`<span style='color:#0f0; font-weight:bold;'>${name}/</span>${lockStr}`);
                        } else {
                            output.push(`<span style='color:#00eeff;'>${name}</span>`);
                        }
                    }
                    printLog(output.join("&nbsp;&nbsp;&nbsp;&nbsp;"), "#fff");
                    break;
                case 'cd':
                    let dest = args[1];
                    if (!dest || dest === "~" || dest === "..") {
                        currentDirObj = virtualFS; currentPath = "~"; updatePrompt();
                    } else {
                        if (dest.endsWith('/')) dest = dest.slice(0, -1);
                        let target = currentDirObj.files[dest];
                        if (target && target.type === 'dir') {
                            if (target.locked) {
                                passwordPromptTarget = { name: dest, obj: target };
                                printLog(`Katalog '${dest}' jest szyfrowany. Wprowadź klucz dostępu:`, "#ffaa00");
                                updatePrompt();
                            } else {
                                currentDirObj = target;
                                currentPath = currentPath === "~" ? "~/" + dest : currentPath + "/" + dest;
                                updatePrompt();
                            }
                        } else {
                            printLog("cd: " + dest + ": Nie ma takiego katalogu", "#f00");
                        }
                    }
                    break;
                case 'cat':
                    let file = args[1];
                    if (currentDirObj.files[file] && currentDirObj.files[file].type === 'file') {
                        printLog(currentDirObj.files[file].content, "#fff");
                    } else {
                        printLog("cat: " + (args[1] || "") + ": Brak pliku lub jest to katalog.", "#f00");
                    }
                    break;
                case 'edit':
                    if (args[1] === "sys.conf" && currentDirObj === virtualFS) {
                        openEditor("sys.conf");
                    } else {
                        printLog("edit: Brak pliku lub brak uprawnień.", "#f00");
                    }
                    break;
                case 'clear':
                    logsDiv.innerHTML = "";
                    break;
            }
        }

        // --- EDYTOR Z PARSOWANIEM CONFIGA ---
        function openEditor(filename) {
            isEditing = true; editorOverlay.style.display = 'flex';
            editorTextarea.value = currentDirObj.files[filename].content;
            editorStatus.innerText = ""; editorTextarea.focus(); cmdInput.disabled = true;
        }

        function closeEditor() {
            isEditing = false; editorOverlay.style.display = 'none';
            cmdInput.disabled = false; cmdInput.focus();
        }

        function saveFile() {
            let content = editorTextarea.value;
            currentDirObj.files["sys.conf"].content = content;
            editorStatus.innerText = "[ZAPISANO]";
            
            // PARSOWANIE KONFIGURACJI
            try {
                // 1. Włączenie/Wyłączenie diody
                if (content.includes("ENABLE_LED_VISUAL=1")) {
                    if (!ledMorseEnabled) {
                        ledMorseEnabled = true;
                        if (currentStage == 1) { printLog("sys.conf: Diagnostyka wizualna LED włączona.", "#ff0", 100); updateLeds(); }
                    }
                } else {
                    if (ledMorseEnabled) { ledMorseEnabled = false; printLog("sys.conf: Diagnostyka LED wyłączona.", "#aaa", 100); stopMorseLedEffect(); updateLeds(); }
                }

                // 2. Parsowanie Czasów (Regex)
                const dotMatch = content.match(/MORSE_DOT_MS=(\d+)/);
                const dashMatch = content.match(/MORSE_DASH_MS=(\d+)/);
                const letterGapMatch = content.match(/MORSE_LETTER_GAP_MS=(\d+)/);

                let changed = false;
                if (dotMatch && timings.dot !== parseInt(dotMatch[1])) { timings.dot = parseInt(dotMatch[1]); changed = true; }
                if (dashMatch && timings.dash !== parseInt(dashMatch[1])) { timings.dash = parseInt(dashMatch[1]); changed = true; }
                if (letterGapMatch && timings.letterGap !== parseInt(letterGapMatch[1])) { timings.letterGap = parseInt(letterGapMatch[1]); changed = true; }

                if (changed) {
                    // Aktualizacja zależnych czasów
                    timings.gap = timings.dot; // Standard: przerwa między elem = 1 kropka
                    timings.wordGap = timings.dot * 7;
                    printLog(`sys.conf: Parametry czasowe Morse'a zaktualizowane. (Dot: ${timings.dot}ms, Dash: ${timings.dash}ms)`, "#ff0", 200);
                    
                    // Jeśli dioda miga, zrestartuj ją z nowymi czasami
                    if (ledMorseEnabled && currentStage === 1) {
                        stopMorseLedEffect();
                        setTimeout(startMorseLedBlink, 500);
                    }
                }

            } catch (e) {
                console.error("Błąd parsowania sys.conf");
            }

            setTimeout(() => { editorStatus.innerText = ""; }, 1500);
        }

        editorTextarea.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveFile(); }
            if (e.ctrlKey && e.key === 'x') { e.preventDefault(); closeEditor(); }
        });

        // --- OBSŁUGA KLAWIATURY (Autouzupełnianie i Hasła) ---
        cmdInput.addEventListener('keydown', function(e) {
            if (isEditing) return;

            if (e.key === 'Tab') {
                e.preventDefault();
                if (passwordPromptTarget) return; 

                const currentVal = this.value;
                const parts = currentVal.trimLeft().split(/\s+/);

                if (parts.length === 1 && parts[0].length > 0) {
                    const matches = knownCommands.filter(c => c.startsWith(parts[0].toLowerCase()));
                    if (matches.length === 1) this.value = matches[0] + " ";
                } 
                else if (parts.length === 2) {
                    const cmd = parts[0];
                    const prefix = parts[1];
                    const availableFiles = Object.keys(currentDirObj.files);
                    const matches = availableFiles.filter(f => f.startsWith(prefix));

                    if (matches.length === 1) {
                        let suffix = currentDirObj.files[matches[0]].type === 'dir' ? '/' : '';
                        this.value = cmd + " " + matches[0] + suffix;
                    }
                }
                updateCmdDisplay();
            }

            if (e.key === 'Enter') {
                if (passwordPromptTarget) {
                    printLog(promptStr.innerText + "*".repeat(this.value.length), "#ffaa00");
                    if (this.value.toLowerCase() === passwordPromptTarget.obj.pass) {
                        printLog("[+] AUTORYZACJA POPRAWNA. ODCZYT KATALOGU...", "#0f0");
                        passwordPromptTarget.obj.locked = false; 
                        currentDirObj = passwordPromptTarget.obj;
                        currentPath = currentPath === "~" ? "~/" + passwordPromptTarget.name : currentPath + "/" + passwordPromptTarget.name;
                        
                        // Zmiana Stage po wejściu do folderu
                        if (passwordPromptTarget.name === "stg_1" && currentStage === 1) {
                            currentStage = 2; stopMorseLedEffect(); updateLeds();
                            printLog("Uruchamianie modułu: Kodowanie (Szyfr Binarny)...", "#0f0", 500);
                        } else if (passwordPromptTarget.name === "stg_2" && currentStage === 2) {
                            currentStage = 3; updateLeds();
                            printLog("Uruchamianie modułu: Kryptografia (Hex)...", "#0f0", 500);
                        }
                    } else {
                        printLog("[-] ACCESS DENIED. NIEPRAWIDŁOWE HASŁO.", "#f00");
                        flashRedLeds();
                    }
                    passwordPromptTarget = null;
                    updatePrompt();
                } else {
                    executeCommand(this.value);
                }
                this.value = '';
                updateCmdDisplay();
            }
        });

        window.addEventListener('click', () => { if (!isEditing && startScreen.style.display === 'none') cmdInput.focus(); });
        updateLeds();

    </script>
</body>
</html>
