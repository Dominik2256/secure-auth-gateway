<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SECURE NODE - TECHNICAL DIAGNOSTICS</title>
    <style>
        body { 
            background-color: #050505; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        #game-viewport {
            width: 1100px;
            height: 650px;
            display: flex;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            background: #000;
        }

        #left-panel {
            flex: 2;
            border-right: 1px solid #0f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #right-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 20, 0, 0.5);
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px #0f0; margin-bottom: 30px;}

        #logs-container { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; margin-bottom: 10px;}
        #logs { margin-top: auto; }
        p { margin: 2px 0; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        
        .terminal-prompt-mockup { display: flex; align-items: center; font-size: 14px; position: relative; border-top: 1px dashed #0f0; padding-top: 10px; }
        .mockup-prompt-char { color: #ff00ff; font-weight: bold; margin-right: 5px; } 
        .mockup-brackets { display: inline-flex; align-items: center; position: relative; }
        .real-command-display { color: #0f0; text-shadow: 0 0 3px #0f0; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .block-cursor { display: inline-block; width: 8px; height: 1.2em; background-color: #0f0; animation: blink 1s step-end infinite; margin-left: 1px; }

        #cmdInput { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; pointer-events: auto; font-size: 14px;}
        
        .led-container { display: flex; align-items: center; width: 100%; margin: 15px 0; padding: 10px; border: 1px solid transparent;}
        .led {
            width: 40px; height: 40px;
            border-radius: 50%;
            background-color: #222;
            margin-right: 20px;
            box-shadow: inset 0 0 10px #000;
            transition: background-color 0.2s, box-shadow 0.2s;
        }
        .led-label { font-size: 16px; font-weight: bold; color: #aaa; text-transform: uppercase; }

        .led.orange { background-color: #ffaa00; box-shadow: 0 0 20px #ffaa00, inset 0 0 10px rgba(255,255,255,0.5); color: #fff; }
        .led.green { background-color: #00ff00; box-shadow: 0 0 20px #00ff00, inset 0 0 10px rgba(255,255,255,0.5); }
        .led.red-flash { animation: redFlash 0.5s linear 2; } /* Miganie na czerwono */
        @keyframes redFlash {
            0%, 100% { background-color: #222; box-shadow: none; }
            50% { background-color: #ff0000; box-shadow: 0 0 30px #ff0000; }
        }

        .led.morse-blink { animation: morseBlink 0.1s linear; }
        @keyframes morseBlink {
            0%, 100% { background-color: #222; box-shadow: none; }
            10%, 90% { background-color: #ffaa00; box-shadow: 0 0 20px #ffaa00; }
        }

        #editor-overlay {
            display: none;
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            background: rgba(0, 10, 0, 0.95);
            border: 1px solid #0f0;
            z-index: 100;
            flex-direction: column;
            padding: 10px;
        }
        #editor-header { color: #000; background: #0f0; padding: 2px 10px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between;}
        #editor-textarea {
            flex-grow: 1;
            background: transparent;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: none;
            outline: none;
            resize: none;
        }
        #editor-footer { font-size: 12px; color: #aaa; margin-top: 5px; border-top: 1px dashed #0f0; padding-top: 5px;}

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #startBtn {
            background: transparent; border: 2px solid #0f0; color: #0f0;
            padding: 15px 30px; font-size: 20px; font-family: monospace;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 0 10px #0f0;
        }
        #startBtn:hover { background: #0f0; color: #000; }

    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color: #0f0;">SYSTEM DIAGNOSTYCZNY</h2>
        <p style="color: #0f0; margin-bottom: 20px;">Wymagana autoryzacja dostępu do kanału audio.</p>
        <button id="startBtn">>> Zainicjuj Sekwencję Startową <<</button>
    </div>

    <div id="game-viewport">
        <div id="left-panel">
            <div id="logs-container">
                <div id="logs"></div>
            </div>
            
            <div class="terminal-prompt-mockup">
                <span class="mockup-prompt-char">adrian@sys-node:~#</span>
                <span class="mockup-brackets">[
                    <span class="real-command-display" id="realCmdDisplay"></span>
                    <span class="block-cursor"></span>
                ]</span>
                <input type="text" id="cmdInput" autocomplete="off" oninput="updateCmdDisplay()">
            </div>

            <div id="editor-overlay">
                <div id="editor-header">
                    <span>EDIT: sys.conf</span>
                    <span id="editor-status"></span>
                </div>
                <textarea id="editor-textarea" spellcheck="false"></textarea>
                <div id="editor-footer">
                    [CTRL+S] Zapisz &nbsp; | &nbsp; [CTRL+X] Wyjdź (bez zapisu)
                </div>
            </div>
        </div>

        <div id="right-panel">
            <h2>STATUS SYSTEMU</h2>
            
            <div class="led-container">
                <div class="led orange" id="led-1"></div>
                <div class="led-label">Stage 1: Cryptography</div>
            </div>
            
            <div class="led-container">
                <div class="led" id="led-2"></div>
                <div class="led-label">Stage 2: Encoded</div>
            </div>
            
            <div class="led-container">
                <div class="led" id="led-3"></div>
                <div class="led-label">Stage 3: Network</div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURACJA I STAN ---
        const logsDiv = document.getElementById('logs');
        const logsContainer = document.getElementById('logs-container');
        const cmdInput = document.getElementById('cmdInput');
        const realCmdDisplay = document.getElementById('realCmdDisplay');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('startBtn');
        const editorOverlay = document.getElementById('editor-overlay');
        const editorTextarea = document.getElementById('editor-textarea');
        const editorStatus = document.getElementById('editor-status');

        const leds = {
            1: document.getElementById('led-1'),
            2: document.getElementById('led-2'),
            3: document.getElementById('led-3')
        };

        const knownCommands = ['ls', 'cat', 'edit', 'clear', 'unlock', 'help'];
        let currentStage = 1; // 1, 2 lub 3
        let audioCtx;
        let isEditing = false;
        
        // Wirtualny System Plików
        let virtualFiles = {
            "readme.txt": "Adrian, wentylator serwera zagłusza sygnał audio (30% vol). Sprawdź diagnostykę wizualną w 'sys.conf'.",
            "sys.conf": "ENABLE_LED_VISUAL=0"
        };

        let ledMorseEnabled = false; // Czy dioda ma migać (zmienia edit sys.conf)

        const morseSequence = "....- ..---   -.... ----.   -.... -.-.   -.... .----   --... ..---   -.... ....-";

        // --- OBSŁUGA AUDIO (Web Audio API) ---
        async function initAudio() {
            startBtn.innerText = "ŁADOWANIE JĄDRA... [OK]";
            startBtn.disabled = true;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            try {
                // Ładowanie plików
                const [startRes, loopRes, morseRes] = await Promise.all([
                    fetch('start.wav'),
                    fetch('loop.wav'),
                    fetch('morse.wav')
                ]);

                const startBuffer = await audioCtx.decodeAudioData(await startRes.arrayBuffer());
                const loopBuffer = await audioCtx.decodeAudioData(await loopRes.arrayBuffer());
                const morseBuffer = await audioCtx.decodeAudioData(await morseRes.arrayBuffer());

                // Konfiguracja źródeł
                const startSource = audioCtx.createBufferSource();
                startSource.buffer = startBuffer;

                const loopSource = audioCtx.createBufferSource();
                loopSource.buffer = loopBuffer;
                loopSource.loop = true;

                const morseSource = audioCtx.createBufferSource();
                morseSource.buffer = morseBuffer;

                // --- KLUCZOWE: GainNode do wyciszenia Morse'a ---
                const morseGain = audioCtx.createGain();
                morseGain.gain.setValueAtTime(0.3, audioCtx.currentTime); // Ustawienie na 30% głośności

                // Podpięcie
                startSource.connect(audioCtx.destination);
                loopSource.connect(audioCtx.destination);
                
                morseSource.connect(morseGain); // Morse idzie przez wyciszenie
                morseGain.connect(audioCtx.destination);

                // Odtwarzanie w czasie t0
                const t0 = audioCtx.currentTime;
                startSource.start(t0); 
                loopSource.start(t0 + startBuffer.duration); 
                morseSource.start(t0 + startBuffer.duration + 5); // Morse startuje 5s po pętli

                // Zmiana interfejsu
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    cmdInput.focus();
                    printIntroLogs();
                }, 1000);

            } catch (e) {
                alert("Błąd ładowania audio. Upewnij się, że start.wav, loop.wav i morse.wav są w repozytorium.");
                startScreen.innerHTML = "<h2 style='color:#f00;'>BŁĄD KRYTYCZNY AUDIO</h2>";
            }
        }

        startBtn.addEventListener('click', initAudio);

        // --- LOGIKA DIOD (LED) ---
        function updateLeds() {
            for (let stage in leds) {
                let led = leds[stage];
                led.className = 'led'; // Reset klas

                if (stage < currentStage) {
                    led.classList.add('green'); // Etapy zaliczone
                } else if (stage == currentStage) {
                    led.classList.add('orange'); // Etap obecny
                    // Jeśli to Etap 1 i włączono wizualizację, zacznij migać Morse'a
                    if (currentStage == 1 && ledMorseEnabled) {
                        startMorseLedBlink();
                    }
                }
                // Etapy przyszłe pozostają czarne (wyłączone)
            }
        }

        function flashRedLeds() {
            // Tymczasowo dodaj klasę flash do wszystkich diod
            for (let stage in leds) {
                leds[stage].className = 'led red-flash';
            }
            // Po 1 sekundzie (koniec animacji) przywróć poprawne kolory
            setTimeout(updateLeds, 1000);
        }

        // --- VISUAL MORSE DIAGNOSTICS (Dioda) ---
        let morseTimeout;
        const timeUnit = 150; // Długość kropki (1 jednostka) w ms

        function startMorseLedBlink() {
            if (currentStage !== 1 || !ledMorseEnabled) return;
            
            // Wyczyść ewentualne poprzednie miganie
            clearTimeout(morseTimeout);
            stopMorseLedEffect(); 

            let currentIndex = 0;

            function processNext() {
                if (currentIndex >= morseSequence.length || currentStage !== 1 || !ledMorseEnabled) {
                    // Koniec sekwencji lub zmiana etapu/wyłączenie configu - zapętl po przerwie
                    if (currentStage == 1 && ledMorseEnabled) {
                        morseTimeout = setTimeout(startMorseLedBlink, 7 * timeUnit); // Przerwa między wyrazami
                    }
                    return;
                }

                const char = morseSequence[currentIndex];
                currentIndex++;

                if (char === ".") {
                    // Kropka: Dioda ON (1 jedn.), potem OFF (1 jedn.)
                    triggerLedPulse(1 * timeUnit);
                    morseTimeout = setTimeout(processNext, 2 * timeUnit); 
                } else if (char === "-") {
                    // Kreska: Dioda ON (3 jedn.), potem OFF (1 jedn.)
                    triggerLedPulse(3 * timeUnit);
                    morseTimeout = setTimeout(processNext, 4 * timeUnit);
                } else if (char === " ") {
                    // Odstęp między literami: Cisza (3 jedn.) - ale 1 jedn. już mamy z poprzedniego processNext
                    morseTimeout = setTimeout(processNext, 2 * timeUnit);
                }
                // Potrójna spacja w morseSequence (-----) zadziała jako przerwa między literami automatycznie
            }

            processNext();
        }

        function triggerLedPulse(duration) {
            leds[1].style.animation = `morseBlink ${duration}ms linear`;
            setTimeout(() => {
                leds[1].style.animation = ''; // Reset animacji
            }, duration);
        }

        function stopMorseLedEffect() {
            if (leds[1]) leds[1].style.animation = '';
        }

        // --- KONSOLE I TERMINAL LOGIC ---
        function updateCmdDisplay() {
            realCmdDisplay.innerHTML = cmdInput.value.replace(/ /g, '&nbsp;');
        }

        function printLog(text, color = "#0f0", delay = 0) {
            setTimeout(() => {
                const p = document.createElement('p');
                p.style.color = color;
                p.innerText = text;
                logsDiv.appendChild(p);
                logsContainer.scrollTop = logsContainer.scrollHeight;
            }, delay);
        }

        function printIntroLogs() {
            printLog("Inicjalizacja Węzła Diagnostycznego... [OK]", "#0f0", 100);
            printLog("Ładowanie VFS (Virtual File System)... [OK]", "#0f0", 300);
            printLog("==========================================", "#0f0", 500);
            printLog("WITAJ ADRIAN W SYSTEMIE DIAGNOSTYCZNYM.", "#ff0", 700);
            printLog("Zlokalizuj anomalie w kanale audio lub diagnostyce wizualnej.", "#0f0", 900);
            printLog("Wpisz 'help', aby wyświetlić dostępne komendy.", "#aaa", 1100);
            printLog("==========================================", "#0f0", 1300);
        }

        function executeCommand(command) {
            const args = command.trim().split(/\s+/);
            const cmd = args[0].toLowerCase();
            printLog("adrian@sys-node:~# " + command, "#ff00ff");

            if (!knownCommands.includes(cmd) && cmd !== "") {
                printLog(" ACCESS DENIED: Komenda nieznana lub brak uprawnień.", "#f00");
                return;
            }

            switch (cmd) {
                case 'help':
                    printLog("Dostępne komendy:");
                    printLog("  ls              - listowanie plików w obecnym katalogu");
                    printLog("  cat [plik]      - odczyt zawartości pliku tekstowego");
                    printLog("  edit [plik]     - edycja pliku konfiguracyjnego");
                    printLog("  unlock [klucz]  - autoryzacja klucza dla obecnego Etapu");
                    printLog("  clear           - czyszczenie ekranu");
                    break;
                case 'ls':
                    let fileList = Object.keys(virtualFiles).join("&nbsp;&nbsp;");
                    printLog(fileList, "#0f0");
                    break;
                case 'cat':
                    if (virtualFiles[args[1]] !== undefined) {
                        printLog(virtualFiles[args[1]], "#fff");
                    } else {
                        printLog("cat: " + (args[1] || "") + ": Brak takiego pliku.", "#f00");
                    }
                    break;
                case 'edit':
                    if (args[1] === "sys.conf") {
                        openEditor("sys.conf");
                    } else if (virtualFiles[args[1]] !== undefined) {
                        printLog("edit: Plik '" + args[1] + "' jest tylko do odczytu.", "#f00");
                    } else {
                        printLog("edit: " + (args[1] || "") + ": Brak takiego pliku.", "#f00");
                    }
                    break;
                case 'unlock':
                    handleUnlock(args[1]);
                    break;
                case 'clear':
                    logsDiv.innerHTML = "";
                    break;
            }
        }

        // --- OBSŁUGA ODBLOKOWYWANIA (Unlock Logic) ---
        function handleUnlock(key) {
            if (currentStage == 1) {
                if ((key || "").toLowerCase() === "bilard") {
                    printLog("[+] AUTORYZACJA ETAPU 1 POWIODŁA SIĘ.", "#0f0");
                    printLog("Uruchamianie modułu: Kodowanie (Szyfr Cezara)...", "#0f0", 500);
                    currentStage = 2;
                    stopMorseLedEffect(); // Dioda przestaje migać Morse'em
                    updateLeds(); // S1 -> Zielony, S2 -> Pomarańczowy
                    
                    // Logi wprowadzające do Etapu 2
                    setTimeout(() => {
                        printLog("Witaj w Etapie 2. Szyfr Cezara powiązany z Twoim Origin ID (Data Urodzenia)... Szukaj hexów.", "#0f0");
                    }, 1000);
                    
                } else {
                    printLog("[-] INVALID ACCESS KEY FOR STAGE 1.", "#f00");
                    flashRedLeds();
                }
            } else {
                printLog("Funkcja 'unlock' niedostępna dla tego etapu lub system już odblokowany.", "#aaa");
            }
        }

        // --- OBSŁUGA EDYTORA (Nano/Edit Logic) ---
        function openEditor(filename) {
            isEditing = true;
            editorOverlay.style.display = 'flex';
            editorTextarea.value = virtualFiles[filename];
            editorStatus.innerText = "";
            editorTextarea.focus();
            cmdInput.disabled = true; // Zablokuj terminal
        }

        function closeEditor() {
            isEditing = false;
            editorOverlay.style.display = 'none';
            cmdInput.disabled = false; // Odblokuj terminal
            cmdInput.focus();
        }

        function saveFile() {
            virtualFiles["sys.conf"] = editorTextarea.value;
            editorStatus.innerText = "[ZAPISANO]";
            
            // Logika zmiany konfiguracji: sprawdź czy ENABLE_LED_VISUAL=1
            if (virtualFiles["sys.conf"].includes("ENABLE_LED_VISUAL=1")) {
                if (!ledMorseEnabled) {
                    ledMorseEnabled = true;
                    if (currentStage == 1) {
                        printLog("sys.conf: Diagnostyka wizualna LED włączona.", "#ff0", 100);
                        updateLeds(); // Odśwież diody, żeby uruchomić miganie
                    }
                }
            } else {
                if (ledMorseEnabled) {
                    ledMorseEnabled = false;
                    printLog("sys.conf: Diagnostyka wizualna LED wyłączona.", "#aaa", 100);
                    stopMorseLedEffect();
                    updateLeds();
                }
            }

            setTimeout(() => { editorStatus.innerText = ""; }, 1500);
        }

        // Obsługa skrótów klawiszowych w edytorze
        editorTextarea.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
            if (e.ctrlKey && e.key === 'x') {
                e.preventDefault();
                closeEditor();
            }
        });

        // --- INPUT TERMINALA ---
        cmdInput.addEventListener('keydown', function(e) {
            if (isEditing) return; // Blokada dla otwartego edytora

            if (e.key === 'Tab') {
                e.preventDefault(); // Blokuje przeskakiwanie focusu w przeglądarce
                const currentVal = this.value;
                const parts = currentVal.trimLeft().split(/\s+/);

                // Autouzupełnianie komend (pierwsze słowo)
                if (parts.length === 1 && parts[0].length > 0) {
                    const matches = knownCommands.filter(c => c.startsWith(parts[0].toLowerCase()));
                    if (matches.length === 1) {
                        this.value = matches[0] + " ";
                    }
                } 
                // Autouzupełnianie plików (drugie słowo)
                else if (parts.length === 2) {
                    const cmd = parts[0];
                    const prefix = parts[1];
                    const availableFiles = Object.keys(virtualFiles);
                    const matches = availableFiles.filter(f => f.startsWith(prefix));

                    if (matches.length === 1) {
                        this.value = cmd + " " + matches[0];
                    }
                }
                updateCmdDisplay();
            }

            if (e.key === 'Enter') {
                executeCommand(this.value);
                this.value = '';
                updateCmdDisplay();
            }
        });

        // Wymuszaj focus na terminalu, jeśli nie edytujemy
        window.addEventListener('click', () => {
            if (!isEditing && startScreen.style.display === 'none') {
                cmdInput.focus();
            }
        });

        // Zainicjuj diody na start (S1 Pomarańczowy)
        updateLeds();

    </script>
</body>
</html>
