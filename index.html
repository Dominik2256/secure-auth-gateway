<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SECURE TERMINAL - ARG LEVEL 1</title>
    <style>
        body { 
            background-color: #050505; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }
        #terminal-wrapper {
            width: 800px;
            height: 500px;
            border: 2px solid #0f0; 
            box-shadow: 0 0 15px #0f0, inset 0 0 10px #0f0; 
            padding: 20px;
            box-sizing: border-box;
            background-color: #000;
        }
        #terminal-content {
            height: 100%;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .crt-effect { text-shadow: 0 0 4px #0f0; }
        p { margin: 2px 0; font-size: 15px; word-wrap: break-word; }
        
        #logs-container {
            flex-grow: 1;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }
        #logs { margin-top: auto; }

        #input_line { display: none; margin-top: 15px; border-top: 1px dashed #0f0; padding-top: 15px; }
        
        .terminal-prompt-mockup { 
            display: flex; 
            align-items: center; 
            font-size: 15px; 
            position: relative;
        }
        .mockup-text { margin-right: 2px; }
        .mockup-brackets { 
            display: inline-flex; 
            align-items: center; 
            position: relative;
        }
        .real-pass-display { 
            position: relative; 
            color: #0f0; 
            letter-spacing: 0.1em; 
        }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .block-cursor { 
            display: inline-block; 
            width: 12px; 
            height: 1.2em; 
            background-color: #0f0; 
            animation: blink 1s step-end infinite; 
            margin-left: -1px; 
        }

        #passInput { 
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0; 
            cursor: text;
            width: 100%; 
            font-size: 15px;
            pointer-events: auto; 
        }
    </style>
</head>
<body>
    
    <!-- SYSTEM LOCK: ZABEZPIECZENIE POZIOM 1 -->
    <!-- Wskazówka 1: Sprawdź źródło. Kod dostępu to: Irish_Pub -->

    <div id="terminal-wrapper" class="crt-effect">
        <div id="terminal-content">
            <div id="logs-container">
                <div id="logs"></div>
            </div>
            
            <div id="input_line">
                <div id="status_output"></div>
                
                <div class="terminal-prompt-mockup" id="prompt-area">
                    <span class="mockup-text">[ PASSWORD:</span>
                    <span class="mockup-brackets">[
                        <span class="real-pass-display" id="realPassDisplay"></span>
                        <span class="block-cursor"></span>
                    ]</span>
                    <input type="text" id="passInput" autocomplete="off" oninput="updatePassDisplay()">
                </div>
            </div>
        </div>
    </div>

    <script>
        const logsDiv = document.getElementById('logs');
        const logsContainer = document.getElementById('logs-container');
        const inputLine = document.getElementById('input_line');
        const passInput = document.getElementById('passInput');
        const realPassDisplay = document.getElementById('realPassDisplay');

        function updatePassDisplay() {
            realPassDisplay.innerHTML = passInput.value.replace(/ /g, '&nbsp;');
        }

        const hakerLogs = [
            "Initiating core systems...",
            "Loading kernel modules... [OK]",
            "Mounting virtual drives... [OK]",
            "Establishing secure connection to target server...",
            "Routing through proxy 192.168.1.104...",
            "Node 1: ONLINE | Node 2: ONLINE | Node 3: OFFLINE",
            "Bypassing external firewall... SUCCESS",
            "Target acquired. Injecting payload into memory...",
            "0x00A1F4C: 8B 45 08 8B 00 8B 40 0C 5D C3",
            "Memory dumped successfully.",
            "Analyzing root directory...",
            "PROGRESS_BAR",
            "Verifying file integrity...",
            "Checksum valid. Deploying...",
            "Switching to fallback authentication protocol...",
            "Disabling local logs...",
            "Wiping tracks... [DONE]",
            "==================================================",
            "WARNING: UNAUTHORIZED ACCESS DETECTED",
            "SYSTEM LOCKDOWN INITIATED",
            "==================================================",
            "Waiting for authentication..."
        ];

        let logIndex = 0;
        
        function printNextLog() {
            if (logIndex < hakerLogs.length) {
                let currentLog = hakerLogs[logIndex];
                
                if (currentLog === "PROGRESS_BAR") {
                    const p = document.createElement('p');
                    logsDiv.appendChild(p);
                    let percent = 0;
                    let barLength = 20; 
                    
                    function updateBar() {
                        let hashes = Math.floor((percent / 100) * barLength);
                        let spaces = barLength - hashes;
                        let barStr = "[" + "#".repeat(hashes) + "&nbsp;".repeat(spaces) + "] " + ("  " + percent).slice(-3) + "%";
                        p.innerHTML = barStr;
                        logsContainer.scrollTop = logsContainer.scrollHeight;
                        
                        if (percent < 100) {
                            percent += Math.floor(Math.random() * 5) + 2; 
                            if (percent > 100) percent = 100;
                            setTimeout(updateBar, 50); 
                        } else {
                            logIndex++;
                            setTimeout(printNextLog, 200); 
                        }
                    }
                    updateBar();
                    return; 
                }

                const log = document.createElement('p');
                log.innerText = currentLog;
                logsDiv.appendChild(log);
                logsContainer.scrollTop = logsContainer.scrollHeight;
                
                logIndex++;
                const speed = Math.random() < 0.15 ? 300 : Math.floor(Math.random() * 60) + 40; 
                setTimeout(printNextLog, speed);
            } else {
                inputLine.style.display = "block";
                passInput.focus();
                logsContainer.scrollTop = logsContainer.scrollHeight;
            }
        }

        window.onload = () => {
            setTimeout(printNextLog, 500);
        };

        passInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                
                document.getElementById('status_output').innerHTML = "<span style='color: #0f0;'>Weryfikacja klucza dostępu...</span>";
                
                setTimeout(() => {
                    window.location.href = val + ".html";
                }, 800);
                
                this.value = '';
                updatePassDisplay();
            }
        });

        document.getElementById('terminal-wrapper').addEventListener('click', () => {
            if (inputLine.style.display === "block") passInput.focus();
        });
    </script>
</body>
</html>
